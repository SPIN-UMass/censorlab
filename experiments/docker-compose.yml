# Docker Compose for Experiment 1 live NFQ evaluation
#
# Three services:
#   censor     — CensorLab in NFQ mode (intercepts traffic)
#   http-server — Simple Python HTTP server (target)
#   traffic-gen — Traffic generator (sends test requests)
#
# Usage:
#   # Build the censorlab image first:
#   #   nix build .#experiment-image && docker load < result
#   # Or use a pre-built image:
#   docker compose -f experiments/docker-compose.yml up

services:
  http-server:
    image: python:3.11-slim
    command: >
      python3 -m http.server 8080 --directory /tmp
    networks:
      experiment:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 2s
      timeout: 5s
      retries: 10

  censor:
    image: censorlab-experiment:latest
    command: >
      bash -c "
        iptables -I FORWARD -p tcp --dport 8080 -j NFQUEUE --queue-num 0 &&
        iptables -I FORWARD -p tcp --sport 8080 -j NFQUEUE --queue-num 0 &&
        censorlab -c /experiment/censor.toml nfq
      "
    volumes:
      - ./01_http_keyword:/experiment:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      experiment:
        ipv4_address: 172.28.0.2
    depends_on:
      http-server:
        condition: service_healthy

  traffic-gen:
    image: censorlab-experiment:latest
    command: >
      bash -c "
        sleep 3 &&
        python3 /experiment/scripts/generate_traffic.py
          --host 172.28.0.10
          --port 8080
          --num-requests 10000
          --output /results/live_eval_results.csv
      "
    volumes:
      - ./01_http_keyword:/experiment:ro
      - ./01_http_keyword/results:/results
    networks:
      experiment:
        ipv4_address: 172.28.0.20
    depends_on:
      - censor

networks:
  experiment:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
