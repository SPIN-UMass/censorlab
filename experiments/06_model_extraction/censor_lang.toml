# CensorLab config for model extraction experiment (CensorLang mode)
# Uses ONNX model ("extractor") to classify connections by first
# 2 packet lengths. CensorLab runs in Tap mode (NFQ, observe-only).

[execution]
mode = "CensorLang"
script = "censor.cl"

[models.extractor]
path = "model.onnx"

[ethernet]
[ethernet.allowlist]
list = []
[ethernet.blocklist]
list = []

[arp]

[ip]
[ip.blocklist]
list = []
action = "None"
[ip.allowlist]
list = []

[icmp]

[tcp]
[tcp.port_allowlist]
list = []
[tcp.port_blocklist]
list = []
[tcp.ip_port_allowlist]
list = []
[tcp.ip_port_blocklist]
list = []

[udp]
[udp.port_allowlist]
list = []
[udp.port_blocklist]
list = []
[udp.ip_port_allowlist]
list = []
[udp.ip_port_blocklist]
list = []
