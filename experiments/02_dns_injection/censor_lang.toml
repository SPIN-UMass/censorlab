# CensorLab config for DNS query dropping (CensorLang heuristic mode)
# Used for Experiment 2 timing/LOC comparison (Table 4)
# Note: CensorLang can only drop, not inject DNS responses

[execution]
mode = "CensorLang"
script = "censor.cl"

[ethernet]
[ethernet.allowlist]
list = []
[ethernet.blocklist]
list = []

[arp]

[ip]
[ip.blocklist]
list = []
action = "None"
[ip.allowlist]
list = []

[icmp]

[tcp]
[tcp.port_allowlist]
list = []
[tcp.port_blocklist]
list = []
[tcp.ip_port_allowlist]
list = []
[tcp.ip_port_blocklist]
list = []

[udp]
[udp.port_allowlist]
list = []
[udp.port_blocklist]
list = []
[udp.ip_port_allowlist]
list = []
[udp.ip_port_blocklist]
list = []
